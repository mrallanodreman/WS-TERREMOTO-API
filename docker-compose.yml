services:
  api:
    build: .
    image: ws-terremoto-api
    container_name: ws-terremoto-api
    env_file:
      - .env
    ports:
      - "8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ms/ws/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
